name: Platform spec contracts

# PR gate for platform-spec content and validators (merge-blocking when required in branch protection).
on:
  pull_request:
    paths:
      - 'site/website/src/content/docs/platform-spec/**'
      - 'packages/trudoc/**'
      - 'packages/beskid-docs-ui/**'
      - 'package.json'
      - 'bun.lock'
      - 'site/website/package.json'
      - 'site/website/astro.config.mjs'
      - '.github/workflows/platform-spec-contracts.yml'

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install workspace dependencies
        run: bun install --frozen-lockfile
      - name: Platform spec CI validation
        id: verify_platform_spec
        continue-on-error: true
        working-directory: site/website
        run: bun run verify:platform-spec-ci
      - name: Upload platform spec layout report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: platform-spec-layout-report
          path: site/website/src/generated/platform-spec-layout-report.json
          if-no-files-found: ignore
      - name: Fail job when contracts are violated
        if: steps.verify_platform_spec.outcome != 'success'
        run: |
          echo "Platform spec contracts failed. See prior logs and artifact: platform-spec-layout-report."
          exit 1
