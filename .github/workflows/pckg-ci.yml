name: pckg CI

on:
  push:
    paths:
      - "pckg/**"
      - ".github/workflows/pckg-ci.yml"
  pull_request:
    paths:
      - "pckg/**"
      - ".github/workflows/pckg-ci.yml"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      PCKG_SUBMODULE_URL: https://github.com/Cyber-Nomad-Collective/beskid_pckg.git
    defaults:
      run:
        working-directory: pckg/src/Server.Tests
    steps:
      - uses: actions/checkout@v4
      - name: Checkout pckg submodule only
        shell: bash
        run: |
          set -euo pipefail
          git submodule sync -- pckg
          git config submodule.pckg.url "${PCKG_SUBMODULE_URL}"
          git -c protocol.version=2 submodule update --init --depth 1 pckg
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: Verify pckg test directory exists
        working-directory: .
        run: |
          test -d pckg/src/Server.Tests
          ls -la pckg/src/Server.Tests
      - name: Unit tests
        run: dotnet test --filter "FullyQualifiedName~Server.Tests.Unit" --configuration Release
