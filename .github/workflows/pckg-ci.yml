name: pckg CI

on:
  push:
    paths:
      - "pckg/**"
      - "ci/**"
      - "noxfile.py"
      - "pckg/noxfile.py"
      - "pckg/ci/**"
      - ".github/workflows/pckg-ci.yml"
  pull_request:
    paths:
      - "pckg/**"
      - "ci/**"
      - "noxfile.py"
      - "pckg/noxfile.py"
      - "pckg/ci/**"
      - ".github/workflows/pckg-ci.yml"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      PCKG_SUBMODULE_URL: https://github.com/Cyber-Nomad-Collective/beskid_pckg.git
    steps:
      - uses: actions/checkout@v4
      - name: Checkout pckg submodule only
        shell: bash
        run: |
          set -euo pipefail
          git submodule sync -- pckg
          git config submodule.pckg.url "${PCKG_SUBMODULE_URL}"
          git -c protocol.version=2 submodule update --init --depth 1 pckg
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Nox
        run: pip install -r ci/requirements.txt
      - name: Verify pckg test directory exists
        run: |
          test -d pckg/src/Server.Tests
          ls -la pckg/src/Server.Tests
      - name: Unit tests
        run: python -m nox --non-interactive -s pckg_unit_tests
