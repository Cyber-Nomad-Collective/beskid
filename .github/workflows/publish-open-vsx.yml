# Aggregate repo: primary Beskid compiler CI runs on the compiler submodule public remote.
# This job expects `compiler/` and `beskid_vscode/` checked out (use submodules: recursive).
name: Publish VS Code Extension to Open VSX

on:
  push:
    branches:
      - main
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: open-vsx-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x64
            platform: linux-x64
            bin_name: beskid_lsp
            openvsx_rust_target: ""
          - os: macos-latest
            label: darwin-arm64
            platform: darwin-arm64
            bin_name: beskid_lsp
            openvsx_rust_target: ""
          - os: macos-latest
            label: darwin-x64
            platform: darwin-x64
            bin_name: beskid_lsp
            openvsx_rust_target: x86_64-apple-darwin
          - os: windows-latest
            label: win32-x64
            platform: win32-x64
            bin_name: beskid_lsp.exe
            openvsx_rust_target: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Rust toolchain (with Intel macOS LSP target)
        if: matrix.platform == 'darwin-x64'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Setup Rust toolchain
        if: matrix.platform != 'darwin-x64'
        uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Nox
        run: pip install -r ci/requirements.txt

      - name: Publish Open VSX
        env:
          COMPILER_SUBMODULE_TOKEN: ${{ secrets.COMPILER_SUBMODULE_TOKEN }}
          OPENVSX_PLATFORM: ${{ matrix.platform }}
          OPENVSX_BIN_NAME: ${{ matrix.bin_name }}
          OPENVSX_RUST_TARGET: ${{ matrix.openvsx_rust_target }}
          OVSX_TOKEN: ${{ secrets.OVSX_TOKEN }}
        run: python -m nox --non-interactive -s open_vsx_publish
