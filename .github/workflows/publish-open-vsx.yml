# Aggregate repo: primary Beskid compiler CI runs on the compiler submodule public remote.
# This job expects `compiler/` and `beskid_vscode/` checked out (use submodules: recursive).
name: Publish VS Code Extension to Open VSX

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: open-vsx-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x64
            platform: linux-x64
            bin_name: beskid_lsp
          - os: macos-latest
            label: darwin-x64
            platform: darwin-x64
            bin_name: beskid_lsp
          - os: windows-latest
            label: win32-x64
            platform: win32-x64
            bin_name: beskid_lsp.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Nox
        run: pip install -r ci/requirements.txt

      - name: Publish Open VSX
        env:
          OPENVSX_PLATFORM: ${{ matrix.platform }}
          OPENVSX_BIN_NAME: ${{ matrix.bin_name }}
          OVSX_TOKEN: ${{ secrets.OVSX_TOKEN }}
        run: python -m nox --non-interactive -s open_vsx_publish
