name: Security Audits

on:
  push:
    branches: [main]
    paths:
      - "ci/**"
      - "compiler/**"
      - "pckg/**"
      - "beskid_vscode/**"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/security-audits.yml"
  pull_request:
    paths:
      - "ci/**"
      - "compiler/**"
      - "pckg/**"
      - "beskid_vscode/**"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/security-audits.yml"
  workflow_dispatch:

jobs:
  bun-root:
    name: Bun audit (root workspace)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Audit root dependencies
        run: bun audit --audit-level high

  bun-vscode:
    name: Bun audit (VS Code extension)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkout beskid_vscode submodule
        run: git -c protocol.version=2 submodule update --init --depth 1 beskid_vscode
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install extension dependencies
        working-directory: beskid_vscode
        run: bun install --frozen-lockfile
      - name: Audit extension dependencies
        working-directory: beskid_vscode
        run: bun audit --audit-level high

  pckg-dotnet:
    name: Dotnet vulnerability scan (pckg)
    runs-on: ubuntu-latest
    env:
      PCKG_SUBMODULE_TOKEN: ${{ secrets.PCKG_SUBMODULE_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Checkout pckg submodule
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${PCKG_SUBMODULE_TOKEN}" ]; then
            echo "Missing required secret: PCKG_SUBMODULE_TOKEN"
            exit 1
          fi
          git submodule sync -- pckg
          git config submodule.pckg.url "https://x-access-token:${PCKG_SUBMODULE_TOKEN}@github.com/Cyber-Nomad-Collective/beskid_pckg.git"
          git -c protocol.version=2 submodule update --init --depth 1 pckg
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: Check Server vulnerabilities
        working-directory: pckg
        run: dotnet list src/Server/Server.csproj package --vulnerable --include-transitive
      - name: Check Server.Tests vulnerabilities
        working-directory: pckg
        run: dotnet list src/Server.Tests/Server.Tests.csproj package --vulnerable --include-transitive

  compiler-rust:
    name: Rust advisory scan (compiler)
    runs-on: ubuntu-latest
    env:
      COMPILER_SUBMODULE_TOKEN: ${{ secrets.COMPILER_SUBMODULE_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Checkout compiler submodule
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${COMPILER_SUBMODULE_TOKEN}" ]; then
            echo "Missing required secret: COMPILER_SUBMODULE_TOKEN"
            exit 1
          fi
          git submodule sync -- compiler
          git config submodule.compiler.url "https://x-access-token:${COMPILER_SUBMODULE_TOKEN}@github.com/Cyber-Nomad-Collective/beskid_compiler.git"
          git -c protocol.version=2 submodule update --init --depth 1 compiler
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Run cargo-audit
        working-directory: compiler
        run: cargo audit

  python-ci:
    name: Python advisory scan (CI requirements)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install pip-audit
        run: python -m pip install --upgrade pip pip-audit
      - name: Audit CI Python dependencies
        run: pip-audit -r ci/requirements.txt
