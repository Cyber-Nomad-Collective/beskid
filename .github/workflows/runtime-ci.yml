name: Runtime CI

on:
  push:
    paths:
      - "compiler/**"
      - "ci/**"
      - "noxfile.py"
      - ".github/workflows/runtime-ci.yml"
  pull_request:
    paths:
      - "compiler/**"
      - "ci/**"
      - "noxfile.py"
      - ".github/workflows/runtime-ci.yml"
  workflow_dispatch:

jobs:
  runtime-linux:
    name: Runtime Tests (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Nox
        run: pip install -r ci/requirements.txt
      - name: Runtime CI (Linux)
        run: python -m nox --non-interactive -s runtime_linux

  runtime-e2e-linux:
    name: Runtime AOT E2E (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Nox
        run: pip install -r ci/requirements.txt
      - name: Runtime E2E (Linux)
        run: python -m nox --non-interactive -s runtime_e2e_linux

  runtime-linux-sanitized:
    name: Runtime Sanitizers (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Nox
        run: pip install -r ci/requirements.txt
      - name: Runtime ASan (Linux)
        run: python -m nox --non-interactive -s runtime_asan_linux

  runtime-macos-check:
    name: Runtime Compile Check (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Nox
        run: pip install -r ci/requirements.txt
      - name: Runtime compile check (macOS)
        run: python -m nox --non-interactive -s runtime_macos_check

  runtime-windows-check:
    name: Runtime Compile Check (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Nox
        run: pip install -r ci/requirements.txt
      - name: Runtime compile check (Windows)
        run: python -m nox --non-interactive -s runtime_windows_check
