version: '3'

silent: true

vars:
  EXT_DIR: '{{.TASKFILE_DIR}}'
  REPO_ROOT: '{{.TASKFILE_DIR}}/../..'

tasks:
  default:
    desc: Build bundled host LSP + extension output
    cmds:
      - task: bundle

  deps:
    desc: Install extension dependencies with Bun
    dir: '{{.EXT_DIR}}'
    cmds:
      - bun install

  clean:
    desc: Remove generated extension artifacts
    dir: '{{.EXT_DIR}}'
    cmds:
      - rm -rf out dist

  clean:bundle:
    desc: Remove bundled server binaries
    dir: '{{.EXT_DIR}}'
    cmds:
      - rm -rf server

  build:ext:
    desc: Compile extension TypeScript
    dir: '{{.EXT_DIR}}'
    deps: [deps]
    cmds:
      - bun run build

  bundle:lsp:host:
    desc: Build and copy host-platform Beskid LSP binary into extension/server
    dir: '{{.REPO_ROOT}}'
    cmds:
      - |
        set -euo pipefail

        case "$(uname -s)" in
          Linux) PLATFORM="linux" ;;
          Darwin) PLATFORM="darwin" ;;
          MINGW*|MSYS*|CYGWIN*) PLATFORM="win32" ;;
          *)
            echo "Unsupported platform: $(uname -s)"
            exit 1
            ;;
        esac

        case "$(uname -m)" in
          x86_64|amd64) ARCH="x64" ;;
          aarch64|arm64) ARCH="arm64" ;;
          *)
            echo "Unsupported architecture: $(uname -m)"
            exit 1
            ;;
        esac

        BIN="beskid_lsp"
        if [ "$PLATFORM" = "win32" ]; then
          BIN="beskid_lsp.exe"
        fi

        cargo build -p beskid_lsp --release

        DEST_DIR="{{.EXT_DIR}}/server/$PLATFORM-$ARCH"
        mkdir -p "$DEST_DIR"
        cp "{{.REPO_ROOT}}/target/release/$BIN" "$DEST_DIR/$BIN"

        if [ "$PLATFORM" != "win32" ]; then
          chmod +x "$DEST_DIR/$BIN"
        fi

        echo "Bundled $BIN to $DEST_DIR"

  bundle:
    desc: Install deps, bundle host LSP binary, and build extension
    deps: [bundle:lsp:host, build:ext]
    cmds:
      - echo "Bundle complete"

  package:vsix:
    desc: Build + package VSIX into dist/
    dir: '{{.EXT_DIR}}'
    deps: [bundle]
    cmds:
      - mkdir -p dist
      - bunx @vscode/vsce package --out dist/beskid.vsix
      - echo "Created dist/beskid.vsix"
